<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="VvAI logo">
  <defs>
    <linearGradient id="vvaiBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#37E8FF"/>
      <stop offset="100%" stop-color="#5A5FFF"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.22 0 0 0 0 0.91 0 0 0 0 1 0 0 0 0.28 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g filter="url(#softGlow)">
    <text x="52" y="236" font-family="Inter, Arial, Helvetica, sans-serif" font-size="218" font-weight="900" letter-spacing="-12" fill="#F8FAFC">V</text>
    <text x="272" y="238" font-family="Inter, Arial, Helvetica, sans-serif" font-size="198" font-weight="900" letter-spacing="-10" fill="url(#vvaiBlue)">v</text>
    <text x="454" y="236" font-family="Inter, Arial, Helvetica, sans-serif" font-size="218" font-weight="900" letter-spacing="-12" fill="#F8FAFC">AI</text>
  </g>
</svg>